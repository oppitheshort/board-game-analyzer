services:
  backend:
    build: ./backend
    restart: always
    volumes:
      - db-data:/app/data
    environment:
      - BGA_JWT_SECRET=${JWT_SECRET}
      - BGA_CORS_ORIGINS=["https://${DOMAIN}"]
      - BGA_DATABASE_URL=sqlite+aiosqlite:///./data/app.db

  webapp:
    build: ./webapp
    restart: always

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - certbot-etc:/etc/letsencrypt:ro
      - certbot-var:/var/www/certbot:ro
    depends_on:
      - backend
      - webapp

  certbot:
    image: certbot/certbot
    volumes:
      - certbot-etc:/etc/letsencrypt
      - certbot-var:/var/www/certbot

volumes:
  db-data:
  certbot-etc:
  certbot-var:
